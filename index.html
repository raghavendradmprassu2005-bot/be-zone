<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ─── Favicon & Apple Touch Icon ───────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- ─── Viewport ─────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ─── PWA Manifest ─────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ─── Theme Color (Be-Zone gold: hsl(38 72% 50%)) ─────── -->
    <meta name="theme-color" content="#C4921A" />
    <meta name="msapplication-TileColor" content="#C4921A" />
    <meta name="msapplication-TileImage" content="/icons/icon-192x192.png" />

    <!-- ─── iOS PWA Support ───────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Be-Zone" />

    <!-- ─── SEO ──────────────────────────────────────────────── -->
    <title>Be-Zone — Glow on Demand | Premium Beauty &amp; Fashion</title>
    <meta name="description" content="Discover premium beauty, skincare, makeup & fashion at Be-Zone. Glow on Demand with curated luxury products for Women, Men & Kids." />
    <meta name="author" content="Raghu" />

    <!-- ─── Open Graph ───────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Be-Zone — Glow on Demand" />
    <meta property="og:description" content="Premium beauty & fashion e-commerce. Discover your perfect style." />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- ─── Twitter Card ─────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Be-Zone — Glow on Demand" />
    <meta name="twitter:description" content="Premium beauty & fashion e-commerce." />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />

    <!-- ─── Fonts ─────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
